[env:m5stick-c-plus2]
platform = espressif32
board = m5stick-c
framework = arduino
board_build.partitions = huge_app.csv
monitor_speed = 115200
lib_deps = 
	m5stack/M5Unified
	m5stack/M5GFX
	adafruit/Adafruit PN532@^1.1.0
	https://github.com/T-vK/ESP32-BLE-Keyboard.git
	https://github.com/T-vK/ESP32-BLE-Mouse.git
	
	dfrobot/DFRobot_GP8XXX @ 1.0.1
build_flags = 
	-Iinclude
	-Isystem
upload_port = COM3
platform_packages = espressif/toolchain-xtensa-esp32s3@~12.2.0


; The project needs to be adapted for emulation
[env:native]
platform = native
build_type = debug
build_flags = 
	-O0 -std=c++14
	-I/ucrt64/include/SDL2
	-L/ucrt64/lib
	-lmingw32 -lSDL2main -lSDL2
	-mwindows
	-DM5GFX_SHOW_FRAME
	-DM5GFX_BOARD=board_M5StickCPlus
	-DM5GFX_SCALE=2
	-DEMULATION=1
lib_deps = 
	m5stack/M5Unified
	m5stack/M5GFX
lib_ignore = 
	WiFi
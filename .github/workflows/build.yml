name: Build firmware

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.1.0"
      
      - name: Configure Arduino CLI
        run: |
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli config add board_manager.additional_urls https://static-cdn.m5stack.com/resource/arduino/package_m5stack_index.json

      - name: Install M5Stack platform
        run: |
          arduino-cli core update-index
          arduino-cli core install m5stack:esp32@2.1.2
          arduino-cli lib install "M5StickCPlus2"
          arduino-cli lib install "Adafruit PN532"

      - name: Install required library
        run: arduino-cli lib install --git-url https://github.com/T-vK/ESP32-BLE-Keyboard

      - name: Install esptool
        run: pip install esptool

      - name: Setup platform.txt
        run: bash ./deauth_prerequisites/install_prerequisites_LINUX.sh
      
      - name: Get version
        run: |
          VERSION=$(grep FIRMWARE_VERSION system/version.h | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "$VERSION" > firmware_version.txt

      - name: Compile firmware
        run: |
          arduino-cli compile --fqbn m5stack:esp32:m5stack_stickc_plus2 \
            --build-path ./build -e \
            --build-property build.partitions=huge_app \
            --build-property upload.maximum_size=3145728 \
            ./m5stick_crystal_firmware.ino

      - name: Merge binaries
        run: |
          esptool --chip esp32s3 merge_bin --output build/crystal_firmware_v${{ env.VERSION }}.bin \
            0x1000 build/m5stick_crystal_firmware.ino.bootloader.bin \
            0x8000 build/m5stick_crystal_firmware.ino.partitions.bin \
            0x10000 build/m5stick_crystal_firmware.ino.bin
          ls build

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: crystal_firmware_v${{ env.VERSION }}
          path: build/crystal_firmware_v${{ env.VERSION }}.bin
          retention-days: 90
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: crystal_firmware_v${{ env.VERSION }}

      - name: Get version from artefact
        run: |
          VERSION=$(cat firmware_version.txt)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: List files
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            
            Build from commit: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          files: ./crystal_firmware_v${{ env.VERSION }}.bin
          generate_release_notes: true